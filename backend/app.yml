# See root app.yml — use Databricks Repos at repo root; set DB_* and other secrets in the app UI.
command:
  - bash
  - -c
  - |
      uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT

python:
  requirements_file: backend/requirements.txt

# Secrets: set in Databricks Apps Environment (do not use empty env: entries here).

resources:
  cpu: 1
  memory: 2Gi

port: 8000
