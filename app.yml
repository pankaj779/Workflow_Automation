# Databricks Apps (Databricks Repos workflow):
# - Point the Repo at THIS directory (the repo root with app.yml).
# - After git pull locally or in CI, run: npm ci && npm run build  (committed dist/ is optional).
# - Required app secrets: DB_HOST (hostname only), DB_HTTP_PATH (/sql/1.0/warehouses/...), DB_TOKEN (PAT with SQL access).
#   Use a Unity Catalog–enabled SQL warehouse. Optional: DB_CATALOG / DB_SCHEMA (default poc_workspace / gold_plus_datamart for KPI tables).
#   Optional session pin (only if needed): DB_INITIAL_CATALOG, DB_INITIAL_SCHEMA — omit if connect fails with unknown catalog.
# - Set FM/Genie env vars as needed — never commit tokens.
command:
  - bash
  - -c
  - |
      uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT

python:
  requirements_file: backend/requirements.txt

env:
  - name: DB_HOST
    value: ""
  - name: DB_HTTP_PATH
    value: ""
  - name: DB_TOKEN
    value: ""

resources:
  cpu: 1
  memory: 2Gi

port: 8000
