# Databricks Apps: configure DB_* in the app UI / secrets — do not commit real tokens.
command:
  - bash
  - -c
  - |
      uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT

python:
  requirements_file: backend/requirements.txt

env:
  - name: DB_HOST
    value: ""
  - name: DB_HTTP_PATH
    value: ""
  - name: DB_TOKEN
    value: ""

resources:
  cpu: 1
  memory: 2Gi

port: 8000
